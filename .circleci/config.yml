version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run: mkdir -p test-reports
      - run:
          name: Run testsuite
          command: circleci run testsuite "ci tests"
      - store_test_results:
          path: test-reports
      - run:
          name: Build app
          command: npm run build

workflows:
  test:
    jobs:
      - test
